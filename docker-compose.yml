version: '3.9'

services:
  api:
    build:
      context: ./apps/api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/signal_lab
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    container_name: signal-lab-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: signal_lab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus
    container_name: signal-lab-prometheus
    ports:
      - "3001:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  loki:
    image: grafana/loki:2.9.0
    container_name: signal-lab-loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/config.yml:/etc/loki/config.yml
    command: -config.file=/etc/loki/config.yml


  promtail:
    image: grafana/promtail:2.9.0
    container_name: signal-lab-promtail
    volumes:
      - ./infra/promtail/config.yml:/etc/promtail/config.yml
      - /var/log:/var/log
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.0.0
    container_name: signal-lab-grafana
    ports:
      - "3002:3000"
    volumes:
      - ./infra/grafana:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki

volumes:
  postgres_data: